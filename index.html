<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AWM OS - AI Marketing on Autopilot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap"
        rel="stylesheet">
    <!-- Telegram Mini App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
        // Notify Telegram that Mini App is ready (required for initData to be populated)
        window.Telegram?.WebApp?.ready();

        // ── Modal open ────────────────────────────────────────────────────
        document.addEventListener("click", (e) => {
            const openBtn = e.target.closest('[data-open-waitlist="1"]');
            if (openBtn) {
                e.preventDefault();
                const overlay = document.getElementById("modalOverlay");
                if (overlay) {
                    overlay.style.display = "flex";
                    document.body.style.overflow = "hidden";
                    overlay.classList.add("active");
                }
            }
        });

        // ── Modal close (X button) ────────────────────────────────────────
        document.addEventListener("click", (e) => {
            if (e.target.closest("#closeModal")) {
                const overlay = document.getElementById("modalOverlay");
                if (!overlay) return;
                overlay.classList.remove("active");
                document.body.style.overflow = "";
                setTimeout(() => { overlay.style.display = "none"; }, 150);
            }
        });

        // ── Modal close (backdrop only) ───────────────────────────────────
        document.addEventListener("click", (e) => {
            if (e.target.id === "modalOverlay") {
                const overlay = e.target;
                overlay.classList.remove("active");
                document.body.style.overflow = "";
                setTimeout(() => { overlay.style.display = "none"; }, 150);
            }
        });

        // ── Waitlist form ─────────────────────────────────────────────────
        const API_URL = "https://ai-bot-a3aj.onrender.com/api/leads/miniapp";
        const BOT_LINK = "https://t.me/AWMOS_bot?start=";

        document.addEventListener("submit", async (e) => {
            if (e.target.id !== "waitlistForm") return;
            e.preventDefault();

            const form = e.target;
            const tg = window.Telegram?.WebApp;
            const statusEl = document.getElementById("waitlistStatus");
            const backBtn = document.getElementById("backToBotBtn");
            const submitBtn = form.querySelector('button[type="submit"]');

            const name = form.querySelector('[data-lead="name"]')?.value?.trim() || "";
            const niche = form.querySelector('[data-lead="niche"]')?.value?.trim() || "";

            // Must run inside Telegram Mini App
            if (!tg?.initData) {
                if (statusEl) {
                    statusEl.textContent = "⚠️ Откройте mini app через Telegram-бота.";
                    statusEl.classList.remove("hidden");
                }
                return;
            }

            if (!name || !niche) {
                if (statusEl) {
                    statusEl.textContent = "Заполните имя и нишу.";
                    statusEl.classList.remove("hidden");
                }
                return;
            }

            // Loading state
            if (submitBtn) {
                submitBtn.disabled = true;
                submitBtn.style.opacity = "0.75";
                submitBtn.textContent = "ОТПРАВЛЯЮ...";
            }
            if (statusEl) statusEl.textContent = "";

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        initData: tg.initData,
                        form: { name, niche, contact: "" }
                    }),
                });

                const data = await res.json().catch(() => ({}));
                console.log("[waitlist] response:", res.status, data);

                if (!res.ok || !data.ok) throw new Error(data.error || `Ошибка ${res.status}`);

                // Success — show status text, keep form intact
                if (statusEl) {
                    statusEl.textContent =
                        `✅ Спасибо, ${name}! Заявка принята. Ниша: ${niche}. Я уже отправила вам сообщение в боте. ` +
                        `Если сообщение не пришло — откройте чат и нажмите Start один раз.`;
                    statusEl.classList.remove("hidden");
                }

                // Disable submit to prevent double send
                if (submitBtn) {
                    submitBtn.disabled = true;
                    submitBtn.style.opacity = "0.5";
                    submitBtn.textContent = "ОТПРАВЛЕНО";
                }

                // Show "back to bot" button with correct deeplink
                if (backBtn) {
                    const leadId = data.lead_id || data.id || data.leadId;
                    backBtn.classList.remove("hidden");
                    backBtn.onclick = () => {
                        if (leadId) {
                            tg.openTelegramLink(BOT_LINK + "lead_" + leadId);
                        }
                        setTimeout(() => tg.close?.(), 300);
                    };
                }

            } catch (err) {
                console.error("[waitlist] error:", err);
                if (statusEl) {
                    statusEl.textContent = "❌ Ошибка отправки. Попробуйте ещё раз.";
                    statusEl.classList.remove("hidden");
                }
                if (submitBtn) {
                    submitBtn.disabled = false;
                    submitBtn.style.opacity = "1";
                    submitBtn.textContent = "СООБЩИТЬ МНЕ О ЗАПУСКЕ";
                }
            }
        });
    </script>
</body>

</html>
